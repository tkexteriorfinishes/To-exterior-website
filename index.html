<!DOCTYPE html>
<html>
<head>
  <title>TK Exterior Finishes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <img src="images/logo.png" class="logo">
</header>

<section class="hero">
  <h1>High-End Exterior Finishes</h1>
</section>

<section class="gallery">
  <img src="images/work1.jpg">
  <img src="images/work2.jpg">
</section>


<section style="padding:80px 20px;background:#111;color:white;">
  <div style="max-width:1200px;margin:auto;">
    <h2 style="font-size:42px;margin-bottom:10px;">Modern Exterior Remodel</h2>
    <p style="color:#ccc;font-size:18px;max-width:900px;margin-bottom:50px;">
      Complete exterior remodel including siding tear-off, rot repair, new windows,
      roofing, fascia, trim, waterproofing, doors, and exterior paint.
    </p>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:40px;">

      <div>
        <h3 style="margin-bottom:15px;">Before</h3>
        <img src="https://placehold.co/800x600?text=Before+Photo" style="width:100%;border-radius:12px;">
      </div>

      <div>
        <h3 style="margin-bottom:15px;">After</h3>
        <img src="https://placehold.co/800x600?text=After+Photo" style="width:100%;border-radius:12px;">
      </div>

    </div>
  </div>
</section>

</body>
</html>
